services:
  app:
    image: ${APP_IMAGE}:${APP_IMAGE_TAG:-latest}
    restart: always
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - storage:/var/www/html/storage
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.projectdesk.rule=Host(`${APP_DOMAIN}`)
      - traefik.http.routers.projectdesk.entrypoints=websecure
      - traefik.http.routers.projectdesk.tls.certresolver=lets-encr
      - traefik.http.services.projectdesk.loadbalancer.server.port=80
    networks:
      - proxy
      - internal

  mysql:
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  proxy:
    external: true
  internal:
    driver: bridge

volumes:
  storage:
  mysql:
